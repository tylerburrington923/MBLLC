         <section id="gallery" class="gallery" aria-labelledby="gallery-heading">
            <div class="container">
                <h2 id="gallery-heading">Completed Projects Portfolio</h2>
                <p>Showcase of verified building deliveries and completed installations.</p>
            </div>

            <!-- Gallery Carousel -->
            <div id="gallery-carousel" class="gallery-carousel" aria-label="Project gallery carousel">
                <div class="carousel-wrapper">
                    <img id="carousel-main-image" class="carousel-image" src="" alt="Project image">
                </div>
                
                <div class="carousel-controls">
                    <button id="carousel-prev" class="carousel-btn carousel-btn-prev" aria-label="Previous project">
                        <span>‹</span>
                    </button>
                    <button id="carousel-next" class="carousel-btn carousel-btn-next" aria-label="Next project">
                        <span>›</span>
                    </button>
                </div>

                <div class="carousel-dots-wrapper">
                    <div id="carousel-dots" class="carousel-dots" role="tablist" aria-label="Project slides"></div>
                </div>

                <div class="carousel-caption">
                    <h3 id="carousel-title">Project Title</h3>
                    <p id="carousel-description">Project description</p>
                    <button class="button button-outline button-sm" onclick="gallery.openLightbox()">View Full Image</button>
                </div>
            </div>
        </section>

        <!-- Lightbox Modal -->
        <div id="lightbox-modal" class="lightbox-modal" style="display: none;" role="dialog" aria-modal="true" aria-label="Full project image viewer">
            <div class="lightbox-container">
                <button class="lightbox-close" aria-label="Close lightbox">&times;</button>
                
                <div class="lightbox-image-wrapper">
                    <img class="lightbox-image" src="" alt="Full project image">
                </div>

                <div class="lightbox-controls">
                    <button class="lightbox-prev" aria-label="Previous image">‹ Previous</button>
                    <button class="lightbox-next" aria-label="Next image">Next ›</button>
                </div>
            </div>
        </div>
